name: CI Deploy

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'CI:Deploy') && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Base Geth Image
        run: |
          docker build -t ghcr.io/sbakurdzhiev/geth-dev:latest -f docker/Dockerfile.geth .

      - name: Start Devnet
        run: |
          docker compose -f docker/docker-compose.yml up -d --pull never
          
          set +e
          for i in {1..30}; do
            RESPONSE=$(curl -s -X POST http://localhost:8545 \
              -H "Content-Type: application/json" \
              --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}')
            if echo "$RESPONSE" | grep -q "result"; then
              echo "RPC is ready"
              READY=1
              break
            fi
            echo "Waiting..."
            sleep 3
          done
          set -e

          if [ -z "$READY" ]; then
            echo "RPC did not become ready in time"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Hardhat
        working-directory: hardhat
        run: npm install

      - name: Deploy Contracts
        working-directory: hardhat
        run: npx hardhat run scripts/deploy.js --network localhost

      - name: Extract chain data
        run: |
          mkdir -p devnet-data
          docker cp geth-devnet:/root/.ethereum ./devnet-data

      - name: Stop Devnet
        run: docker compose -f docker/docker-compose.yml down

      - name: Build Predeployed Image
        run: |
          docker build \
            -t ghcr.io/sbakurdzhiev/geth-dev:predeployed \
            -t ghcr.io/sbakurdzhiev/geth-dev:predeployed-${{ github.sha }} \
            -f docker/Dockerfile.predeployed .

      - name: Run Devnet With Predeployed Contracts
        run: |
          docker run -d --name geth-test -p 8545:8545 \
            ghcr.io/sbakurdzhiev/geth-dev:predeployed

          set +e
          for i in {1..30}; do
            RESPONSE=$(curl -s -X POST http://localhost:8545 \
              -H "Content-Type: application/json" \
              --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}')
            if echo "$RESPONSE" | grep -q "result"; then
              echo "RPC is ready"
              READY=1
              break
            fi
            echo "Waiting..."
            sleep 3
          done
          set -e

          if [ -z "$READY" ]; then
            echo "RPC did not become ready in time"
            exit 1
          fi

      - name: Run Hardhat Tests
        working-directory: hardhat
        run: npx hardhat test --network localhost

      - name: Push Image
        run: |
          docker push ghcr.io/sbakurdzhiev/geth-dev:predeployed
          docker push ghcr.io/sbakurdzhiev/geth-dev:predeployed-${{ github.sha }}

      - name: Cleanup
        run: docker stop geth-test || true